name: Build

# Reusable: cross-compiles every target. When `package` is true, archives
# each binary and uploads it as an artifact for a downstream release.
on:
  workflow_call:
    inputs:
      version:
        description: "Version string stamped into the binary (default: short SHA)."
        type: string
        default: ""
      package:
        description: "Archive binaries and upload them as artifacts."
        type: boolean
        default: false

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and (optionally) package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          # Inputs are supplied by trusted caller workflows, but quote anyway.
          VERSION: ${{ inputs.version }}
          PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          ver="${VERSION:-${GITHUB_SHA::12}}"
          bin="poplog-local-mcp"
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi

          go build -trimpath \
            -ldflags "-s -w -X main.version=${ver}" \
            -o "${bin}${ext}" ./cmd/poplog-local-mcp

          if [ "$PACKAGE" = "true" ]; then
            mkdir -p dist
            pkg="${bin}_${ver}_${GOOS}_${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              zip "dist/${pkg}.zip" "${bin}${ext}" README.md
            else
              tar -czf "dist/${pkg}.tar.gz" "${bin}${ext}" README.md
            fi
          fi

      - name: Upload build artifact
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1
