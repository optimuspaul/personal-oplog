name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  validate:
    name: Validate input
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version and ensure tag is new
        env:
          # workflow_dispatch input is user-supplied: pass via env and quote.
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
            echo "Invalid version '$VERSION'. Expected vMAJOR.MINOR.PATCH (e.g. v1.2.3)."
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag '$VERSION' already exists. Choose a new version."
            exit 1
          fi
          echo "Releasing $VERSION"

  test:
    needs: validate
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ inputs.version }}
      package: true

  publish:
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ inputs.version }}
      # Tag does not exist yet — create it at the commit this run checked out.
      target: ${{ github.sha }}
